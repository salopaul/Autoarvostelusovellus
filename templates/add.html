{% extends "base.html" %}
{% block content %}

<form method="POST">
<input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
Merkki: <input name="brand"><br>
Malli: <input name="model"><br>
Vuosi: <input name="year"><br>
Arvosana (1-5): <input name="rating"><br>

{% for cat in categories %}
<input type="checkbox" name="categories" value="{{ cat.id }}">
{{ cat.name }}<br>
{% endfor %}

<button type="submit">Lisää</button>
</form>

{% endblock %}
